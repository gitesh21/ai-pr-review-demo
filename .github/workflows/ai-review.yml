name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/main...HEAD > diff.txt
          echo "Diff size: $(wc -c < diff.txt) bytes"

      - name: AI Review via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          with open("diff.txt") as f:
              diff = f.read()[:3000]

          payload = json.dumps({
              "contents": [{
                  "parts": [{"text": f"Review this PR diff and give concise feedback:\n\n{diff}"}]
              }]
          }).encode()

          key = os.environ['GEMINI_API_KEY']
          req = urllib.request.Request(
              f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={key}",
              data=payload,
              headers={"Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
                  review = data["candidates"][0]["content"]["parts"][0]["text"]
                  comment = "## 🤖 AI PR Review (Gemini)\n\n" + review
          except Exception as e:
              comment = f"## 🤖 AI PR Review\n\n⚠️ Error: {str(e)}"

          pr_payload = json.dumps({"body": comment}).encode()
          pr_req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=pr_payload,
              headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(pr_req) as res:
              print("Comment posted:", res.status)
          EOF