name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/main...HEAD > diff.txt
          echo "Diff size: $(wc -c < diff.txt) bytes"

      - name: AI Review via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, subprocess

          # Get diff
          with open("diff.txt") as f:
              diff = f.read()[:3000]

          # Call Groq
          payload = json.dumps({
              "model": "llama3-8b-8192",
              "messages": [{"role": "user", "content": f"Review this PR diff briefly and give feedback:\n\n{diff}"}],
              "max_tokens": 500
          }).encode()

          req = urllib.request.Request(
              "https://api.groq.com/openai/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['GROQ_API_KEY']}",
                  "Content-Type": "application/json"
              }
          )

          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
                  comment = "## 🤖 AI PR Review\n\n" + data["choices"][0]["message"]["content"]
          except Exception as e:
              comment = f"## 🤖 AI PR Review\n\n⚠️ Error: {str(e)}"

          # Post comment to PR
          pr_payload = json.dumps({"body": comment}).encode()
          pr_req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=pr_payload,
              headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(pr_req) as res:
              print("Comment posted:", res.status)
          EOF