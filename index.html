<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🤖 AI PR Review Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 48px; max-width: 480px; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    h1 { font-size: 1.8rem; margin-bottom: 12px; }
    p { color: #666; line-height: 1.6; }
    .badge { display: inline-block; margin-top: 24px; background: #000; color: white; padding: 8px 20px; border-radius: 99px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🤖 AI PR Review Demo v3</h1>
    <p>This site is monitored by an AI agent that automatically reviews every pull request using Groq.</p>
    <span class="badge">Powered by GitHub Actions + Groq</span>
  </div>
</body>
</html>
